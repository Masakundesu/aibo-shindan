<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--pink:#E8A0BF;--purple:#A78BCA;--deep:#6B4C8A;--soft:#F5E6F0;
--cream:#FFF8F0;--coral:#FF8A9E;--mint:#A8E6CF;--gold:#FFD700;
--text:#3D2C4E;--sub:#7A6B8A;--bg:linear-gradient(135deg,#FFF0F5 0%,#F0E6FF 50%,#E6F0FF 100%);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans JP',sans-serif;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden;line-height:1.7}
.screen{display:none;animation:fadeIn .6s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes ripple{0%{box-shadow:0 0 0 0 rgba(232,160,191,.4)}70%{box-shadow:0 0 0 15px rgba(232,160,191,0)}100%{box-shadow:0 0 0 0 rgba(232,160,191,0)}}

/* ===== TOP SCREEN ===== */
.top-screen{text-align:center;padding:40px 20px 60px;max-width:480px;margin:0 auto}
.top-logo{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--coral),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.05em;margin-bottom:4px}
.top-sub{font-size:.85rem;color:var(--sub);margin-bottom:32px;letter-spacing:.15em}
.top-hero{width:200px;height:200px;margin:0 auto 28px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:5rem;animation:float 3s ease-in-out infinite;box-shadow:0 12px 40px rgba(167,139,202,.3)}
.top-catch{font-size:1.3rem;font-weight:700;margin-bottom:12px;line-height:1.6}
.top-catch span{background:linear-gradient(transparent 60%,rgba(232,160,191,.35) 60%)}
.top-desc{font-size:.85rem;color:var(--sub);margin-bottom:36px;line-height:1.8;padding:0 8px}
.top-badges{display:flex;justify-content:center;gap:12px;margin-bottom:32px;flex-wrap:wrap}
.badge{background:#fff;border-radius:20px;padding:6px 14px;font-size:.72rem;color:var(--deep);box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:4px}
.start-btn{display:inline-block;background:linear-gradient(135deg,var(--coral),var(--purple));color:#fff;border:none;border-radius:50px;padding:16px 48px;font-size:1.1rem;font-weight:700;cursor:pointer;letter-spacing:.1em;box-shadow:0 6px 24px rgba(232,160,191,.4);transition:all .3s;animation:ripple 2s infinite}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(232,160,191,.5)}
.top-note{font-size:.7rem;color:var(--sub);margin-top:20px}
.partner-link{display:block;margin-top:16px;font-size:.8rem;color:var(--purple);text-decoration:underline;cursor:pointer}

/* ===== QUESTION SCREEN ===== */
.q-screen{max-width:480px;margin:0 auto;padding:20px 16px 40px}
.q-progress{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.q-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.6);border-radius:3px;overflow:hidden}
.q-bar{height:100%;background:linear-gradient(90deg,var(--coral),var(--purple));border-radius:3px;transition:width .4s ease}
.q-num{font-size:.75rem;color:var(--sub);white-space:nowrap}
.q-axis-tag{display:inline-block;background:rgba(167,139,202,.15);color:var(--deep);font-size:.65rem;padding:3px 10px;border-radius:12px;margin-bottom:10px}
.q-text{font-size:1.05rem;font-weight:700;margin-bottom:20px;line-height:1.6;min-height:3.2em}
.q-options{display:flex;flex-direction:column;gap:10px}
.q-opt{background:#fff;border:2px solid transparent;border-radius:14px;padding:14px 16px;font-size:.88rem;cursor:pointer;transition:all .25s;text-align:left;line-height:1.5;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.q-opt:hover{border-color:var(--pink);transform:translateX(4px)}
.q-opt.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(232,160,191,.1),rgba(167,139,202,.1))}
.q-nav{display:flex;justify-content:space-between;margin-top:24px}
.q-nav-btn{background:none;border:1px solid var(--purple);color:var(--purple);border-radius:24px;padding:8px 24px;font-size:.82rem;cursor:pointer;transition:all .2s}
.q-nav-btn:hover{background:var(--purple);color:#fff}
.q-nav-btn.next{background:var(--purple);color:#fff;border:none}
.q-nav-btn.next:hover{background:var(--deep)}
.q-nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* ===== LOADING SCREEN ===== */
.loading-screen{text-align:center;padding:80px 20px;max-width:480px;margin:0 auto}
.loading-circle{width:80px;height:80px;margin:0 auto 24px;border-radius:50%;border:4px solid var(--soft);border-top-color:var(--purple);animation:spin 1s linear infinite}
.loading-text{font-size:1rem;color:var(--sub);margin-bottom:8px}
.loading-sub{font-size:.75rem;color:var(--sub)}
.loading-axes{margin-top:32px;display:flex;flex-direction:column;gap:12px;max-width:280px;margin-left:auto;margin-right:auto}
.loading-axis{display:flex;align-items:center;gap:10px}
.loading-axis-icon{font-size:1.2rem;opacity:0;animation:fadeIn .4s ease forwards}
.loading-axis-label{font-size:.82rem;color:var(--text);opacity:0;animation:fadeIn .4s ease forwards}
.loading-axis-check{color:var(--mint);font-weight:700;opacity:0;animation:fadeIn .3s ease forwards}

/* ===== RESULT SCREEN ===== */
.result-screen{max-width:520px;margin:0 auto;padding:24px 16px 60px}
.result-header{text-align:center;margin-bottom:28px}
.result-pre{font-size:.8rem;color:var(--sub);margin-bottom:4px}
.result-type-code{font-size:.75rem;color:var(--purple);background:rgba(167,139,202,.1);padding:2px 12px;border-radius:12px;display:inline-block;margin-bottom:8px}
.result-name{font-size:1.6rem;font-weight:900;margin-bottom:4px}
.result-emoji{font-size:3.5rem;margin:12px 0;animation:float 3s ease-in-out infinite}
.result-copy{font-size:.9rem;color:var(--sub);font-style:italic;margin-bottom:0}
.result-card{background:#fff;border-radius:20px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.result-card h3{font-size:.95rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--soft);display:flex;align-items:center;gap:6px}
.result-card p{font-size:.85rem;line-height:1.8;color:var(--text)}

/* Axis Radar */
.radar-wrap{text-align:center;margin-bottom:0}
.radar-wrap canvas{max-width:280px;margin:0 auto}
.axis-bars{display:flex;flex-direction:column;gap:14px;margin-top:16px}
.axis-bar-item{display:flex;align-items:center;gap:8px}
.axis-label-l,.axis-label-r{font-size:.7rem;color:var(--sub);width:56px;text-align:center}
.axis-bar-track{flex:1;height:10px;background:var(--soft);border-radius:5px;position:relative;overflow:hidden}
.axis-bar-fill{height:100%;border-radius:5px;transition:width .8s ease}
.axis-bar-center{position:absolute;left:50%;top:0;width:2px;height:100%;background:rgba(0,0,0,.1)}
.axis-bar-dot{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;border:2px solid #fff;transform:translate(-50%,-50%);box-shadow:0 1px 4px rgba(0,0,0,.2);transition:left .8s ease}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:8px}
.tag{background:var(--soft);color:var(--deep);font-size:.78rem;padding:5px 12px;border-radius:16px}
/* Advice */
.advice-list{display:flex;flex-direction:column;gap:10px}
.advice-item{display:flex;gap:8px;align-items:flex-start}
.advice-num{background:var(--purple);color:#fff;width:22px;height:22px;border-radius:50%;font-size:.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.advice-text{font-size:.83rem;line-height:1.7}

/* Compat */
.compat-best,.compat-grow{background:var(--soft);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.compat-label{font-size:.72rem;font-weight:700;color:var(--purple);margin-bottom:4px}
.compat-types{font-size:.85rem;font-weight:500}
.compat-reason{font-size:.78rem;color:var(--sub);margin-top:4px;line-height:1.6}

/* Partner Section */
.partner-section{background:linear-gradient(135deg,rgba(232,160,191,.1),rgba(167,139,202,.1));border-radius:20px;padding:24px 20px;margin-bottom:16px;text-align:center}
.partner-section h3{font-size:1rem;font-weight:700;margin-bottom:12px}
.partner-btn{display:inline-block;background:linear-gradient(135deg,var(--coral),var(--purple));color:#fff;border:none;border-radius:50px;padding:12px 32px;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 16px rgba(232,160,191,.3);transition:all .3s}
.partner-btn:hover{transform:translateY(-2px)}
.partner-result{margin-top:16px;text-align:left}
.partner-match-score{text-align:center;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--coral),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0 4px}
.partner-match-label{text-align:center;font-size:.8rem;color:var(--sub);margin-bottom:16px}

/* Share */
.share-section{text-align:center;margin-top:24px}
.share-section h3{font-size:.9rem;font-weight:700;margin-bottom:12px}
.share-btns{display:flex;justify-content:center;gap:12px}
.share-btn{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;font-size:.82rem;font-weight:500;cursor:pointer;border:none;color:#fff;transition:all .2s}
.share-btn:hover{transform:translateY(-2px)}
.share-btn.x{background:#000}
.share-btn.line{background:#06C755}
.share-btn.copy{background:var(--purple)}
.retry-btn{display:inline-block;margin-top:20px;background:none;border:1px solid var(--purple);color:var(--purple);border-radius:24px;padding:8px 24px;font-size:.82rem;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:var(--purple);color:#fff}

/* Children value indicator */
.child-val{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;background:rgba(168,230,207,.15);border-radius:10px}
.child-val-icon{font-size:1.2rem}
.child-val-text{font-size:.78rem;color:var(--text);line-height:1.5}
</style>
</head>
