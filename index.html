*{margin:0;padding:0;box-sizing:border-box}
:root{

@keyframes spin{to{transform:rotate(360deg)}}

/* ===== TOP SCREEN ===== */
.top-screen{text-align:center;padding:40px 20px 60px;max-width:480px;margin:0 auto}
.top-logo{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--coral),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.05em;margin-bottom:4px}

.radar-wrap{text-align:center;margin-bottom:0}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:8px}

.advice-list{display:flex;flex-direction:column;gap:10px}

/* Compat */
.compat-best,.compat-grow{background:var(--soft);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.compat-label{font-size:.72rem;font-weight:700;color:var(--purple);margin-bottom:4px}
.compat-types{font-size:.85rem;font-weight:500}
.compat-reason{font-size:.78rem;color:var(--sub);margin-top:4px;line-height:1.6}

/* Partner Section */
.partner-section{background:linear-gradient(135deg,rgba(232,160,191,.1),rgba(167,139,202,.1));border-radius:20px;padding:24px 20px;margin-bottom:16px;text-align:center}
.partner-section h3{font-size:1rem;font-weight:700;margin-bottom:12px}
.partner-btn{display:inline-block;background:linear-gradient(135deg,var(--coral),var(--purple));color:#fff;border:none;border-radius:50px;padding:12px 32px;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 16px rgba(232,160,191,.3);transition:all .3s}
.partner-btn:hover{transform:translateY(-2px)}
.partner-result{margin-top:16px;text-align:left}
.partner-match-score{text-align:center;font-size:2rem;font-weight:900;background:linear-gradient(135deg,var(--coral),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0 4px}
.partner-match-label{text-align:center;font-size:.8rem;color:var(--sub);margin-bottom:16px}

/* Share */
.share-section{text-align:center;margin-top:24px}
.share-section h3{font-size:.9rem;font-weight:700;margin-bottom:12px}
.share-btns{display:flex;justify-content:center;gap:12px}
.share-btn{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;font-size:.82rem;font-weight:500;cursor:pointer;border:none;color:#fff;transition:all .2s}
.share-btn:hover{transform:translateY(-2px)}
.share-btn.x{background:#000}
.share-btn.line{background:#06C755}
.share-btn.copy{background:var(--purple)}
.retry-btn{display:inline-block;margin-top:20px;background:none;border:1px solid var(--purple);color:var(--purple);border-radius:24px;padding:8px 24px;font-size:.82rem;cursor:pointer;transition:all .2s}
.retry-btn:hover{background:var(--purple);color:#fff}

/* Children value indicator */

</style>

<script>
// ============================
// AIBO DIAGNOSTIC ENGINE v2.0
// 4 Axes × 16 Types
// Based on: Attachment Theory, Gottman Method, Love Languages, Interview Insights
// ============================

const AXES = [
  { id:'A', name:'愛情表現', icon:'💗', tagL:'オープン', tagR:'ひかえめ', color:'#FF8A9E' },
  { id:'I', name:'親密スタイル', icon:'🔥', tagL:'情熱的', tagR:'安定的', color:'#E8A0BF' },
  { id:'B', name:'パートナーとの距離感', icon:'🤝', tagL:'自立型', tagR:'密着型', color:'#A78BCA' },
  { id:'O', name:'将来・家族観', icon:'🌱', tagL:'柔軟型', tagR:'計画型', color:'#A8E6CF' }
];

// 20 Questions: 5 per axis
// Each option: [A_score, I_score, B_score, O_score]
// Positive = left side (Open/Passionate/Free/Dynamic), Negative = right side
const QUESTIONS = [
  // === A: Affection Expression (愛情表現) ===
  { axis:0, text:'パートナーに「好き」「愛してる」と言葉にすることについて、あなたはどう感じますか？',
    opts:[
      {t:'自然に毎日言えるし、言いたい', s:[3,0,0,0]},
      {t:'たまに言うけど、照れくさい時もある', s:[1,0,0,0]},
      {t:'言葉より態度で示したいタイプ', s:[-1,0,0,0]},
      {t:'恥ずかしくて、ほとんど言えない', s:[-3,0,0,0]}
    ]},
  { axis:0, text:'パートナーと意見が食い違った時、あなたはどうしますか？',
    opts:[
      {t:'その場で率直に自分の気持ちを伝える', s:[3,0,0,0]},
      {t:'少し時間を置いてから、冷静に話す', s:[1,0,0,0]},
      {t:'相手の様子を見ながら、タイミングを探る', s:[-1,0,0,0]},
      {t:'自分の中で消化して、あまり言わない', s:[-3,0,0,0]}
    ]},
  { axis:0, text:'パートナーとの「性」や「スキンシップ」について話し合うことは…',
    opts:[
      {t:'お互いオープンに話せる・話したい', s:[3,0,0,0]},
      {t:'必要があれば話すけど、積極的ではない', s:[1,0,0,0]},
      {t:'話題にするのはちょっと勇気がいる', s:[-1,0,0,0]},
      {t:'できれば避けたい。察してほしい', s:[-3,0,0,0]}
    ]},
  { axis:0, text:'記念日やイベントのお祝い、あなたのスタイルは？',
    opts:[
      {t:'サプライズや手紙など、形にして伝えたい', s:[3,0,0,0]},
      {t:'一緒に過ごす時間を大切にしたい', s:[1,0,0,0]},
      {t:'特別なことはしないけど、気持ちはある', s:[-1,0,0,0]},
      {t:'あまり気にしない。日常が大事', s:[-3,0,0,0]}
    ]},
  { axis:0, text:'パートナーに不満を感じた時、あなたは…',
    opts:[
      {t:'早めに伝えて一緒に解決したい', s:[3,0,0,0]},
      {t:'伝えるけど、言い方に悩む', s:[1,0,0,0]},
      {t:'我慢することが多い。でも溜まる', s:[-1,0,0,0]},
      {t:'不満を感じても、表に出さない', s:[-3,0,0,0]}
    ]},

  // === I: Intimacy Style (親密スタイル) ===
  { axis:1, text:'パートナーとの「ドキドキ」や「ときめき」について、どう思いますか？',
    opts:[
      {t:'長く一緒にいても、ときめきは絶対必要！', s:[0,3,0,0]},
      {t:'たまにときめきがあると嬉しい', s:[0,1,0,0]},
      {t:'安心感のほうが大事。ドキドキはなくてもいい', s:[0,-1,0,0]},
      {t:'落ち着いた関係が理想。ときめきは求めない', s:[0,-3,0,0]}
    ]},
  { axis:1, text:'パートナーとのスキンシップ（手をつなぐ、ハグなど）はどのくらいが理想？',
    opts:[
      {t:'毎日たくさん触れ合いたい', s:[0,3,0,0]},
      {t:'自然な流れで日常的にあるといい', s:[0,1,0,0]},
      {t:'たまにで十分。気が向いた時に', s:[0,-1,0,0]},
      {t:'なくても特に困らない', s:[0,-3,0,0]}
    ]},
  { axis:1, text:'デートで行きたいのは？',
    opts:[
      {t:'新しい場所やアクティビティに挑戦したい', s:[0,3,0,0]},
      {t:'お気に入りの場所をベースに、たまに新しい場所も', s:[0,1,0,0]},
      {t:'いつもの場所でゆっくり過ごしたい', s:[0,-1,0,0]},
      {t:'家でまったりが一番落ち着く', s:[0,-3,0,0]}
    ]},
  { axis:1, text:'「マンネリ」について、あなたはどう感じますか？',
    opts:[
      {t:'マンネリは大敵！常に新鮮さを求めたい', s:[0,3,0,0]},
      {t:'ちょっとした変化は必要だと思う', s:[0,1,0,0]},
      {t:'安定した日常も悪くないと思う', s:[0,-1,0,0]},
      {t:'マンネリとは思わない。それが心地いい', s:[0,-3,0,0]}

  { axis:1, text:'パートナーとの性的な関係で大切にしたいことは？',
    opts:[
      {t:'お互いの欲求を積極的に探求したい', s:[0,3,0,0]},

      {t:'精神的なつながりがあれば、頻度は気にしない', s:[0,-3,0,0]}

  // === B: Bonding Distance (距離感) ===
  { axis:2, text:'理想のパートナーとの休日の過ごし方は？',
    opts:[
      {t:'それぞれ好きなことをして、夜に合流', s:[0,0,3,0]},
      {t:'午前は自由、午後は一緒に過ごす', s:[0,0,1,0]},
      {t:'基本一緒に過ごすけど、お互い自由な時間も', s:[0,0,-1,0]},
      {t:'起きてから寝るまでずっと一緒がいい', s:[0,0,-3,0]}
    ]},
  { axis:2, text:'パートナーのスマホを見ることについてどう思いますか？',
    opts:[
      {t:'お互いのプライバシーは絶対。見る必要なし', s:[0,0,3,0]},
      {t:'基本見ないけど、オープンな関係がいい', s:[0,0,1,0]},
      {t:'ロックはかけないでほしい。安心したい', s:[0,0,-1,0]},
      {t:'見せ合えるくらいの関係が理想', s:[0,0,-3,0]}
    ]},
  { axis:2, text:'パートナーが異性の友人と二人で食事に行くことについて…',
    opts:[
      {t:'全く問題ない。自分も行くし', s:[0,0,3,0]},
      {t:'事前に言ってくれれば気にしない', s:[0,0,1,0]},
      {t:'正直、少しモヤモヤする', s:[0,0,-1,0]},
      {t:'できれば行ってほしくない', s:[0,0,-3,0]}
    ]},
  { axis:2, text:'パートナーとの「報連相」（今どこにいる・何してるの共有）は？',
    opts:[

// ============================
// STATE
// ============================
let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let scores = [0,0,0,0]; // A, I, B, O
let partnerCode = null;

// Check for partner code in URL
(function(){
  const p = new URLSearchParams(window.location.search);
  if(p.get('p')) partnerCode = p.get('p');
})();

// ============================
// SCREEN MANAGEMENT
// ============================
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(){
  currentQ = 0;
  answers.fill(null);
  scores = [0,0,0,0];
  renderQ();
  showScreen('qScreen');
}

// ============================
// QUESTION RENDERING
// ============================
function renderQ(){
  const q = QUESTIONS[currentQ];
  const ax = AXES[q.axis];
  document.getElementById('qBar').style.width = ((currentQ+1)/QUESTIONS.length*100)+'%';
  document.getElementById('qNum').textContent = (currentQ+1)+'/'+QUESTIONS.length;
  document.getElementById('qAxis').innerHTML = ax.icon+' '+ax.name;
  document.getElementById('qText').textContent = q.text;
  
  const optDiv = document.getElementById('qOpts');
  optDiv.innerHTML = '';
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('div');
    btn.className = 'q-opt' + (answers[currentQ]===i?' selected':'');
    btn.textContent = o.t;
    btn.onclick = ()=>selectOpt(i);
    optDiv.appendChild(btn);
  });
  
  document.getElementById('prevBtn').disabled = currentQ===0;
  document.getElementById('nextBtn').disabled = answers[currentQ]===null;
  document.getElementById('nextBtn').textContent = currentQ===QUESTIONS.length-1?'結果を見る →':'次へ →';
}

function selectOpt(i){
  answers[currentQ] = i;
  document.querySelectorAll('.q-opt').forEach((el,idx)=>{
    el.classList.toggle('selected',idx===i);
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQ(){
  if(answers[currentQ]===null) return;
  if(currentQ < QUESTIONS.length-1){
    currentQ++;
    renderQ();
  } else {
    calculateResult();
  }
}

function prevQ(){
  if(currentQ>0){
    currentQ--;
    renderQ();
  }
}

// ============================
// CALCULATION
// ============================
function calculateResult(){
  scores = [0,0,0,0];
  for(let i=0;i<QUESTIONS.length;i++){
    if(answers[i]!==null){
      const s = QUESTIONS[i].opts[answers[i]].s;
      for(let j=0;j<4;j++) scores[j]+=s[j];
    }
  }
  showLoading();
}

function getTypeCode(){
  const a = scores[0]>=0?'O':'R';
  const i = scores[1]>=0?'P':'S';
  const b = scores[2]>=0?'F':'T';
  const o = scores[3]>=0?'D':'L';
  return a+i+b+o;
}

// ============================
// LOADING ANIMATION
// ============================
function showLoading(){
  showScreen('loadScreen');
  const loadAxes = document.getElementById('loadAxes');
  loadAxes.innerHTML = '';
  
  AXES.forEach((ax,i)=>{
    const d = document.createElement('div');
    d.className = 'loading-axis';
    d.innerHTML = `
      <span class="loading-axis-icon" style="animation-delay:${i*0.8}s">${ax.icon}</span>
      <span class="loading-axis-label" style="animation-delay:${i*0.8+0.2}s">${ax.name}を分析中...</span>
      <span class="loading-axis-check" style="animation-delay:${i*0.8+0.6}s">✓</span>`;
    loadAxes.appendChild(d);
  });
  
  setTimeout(()=>showResult(), 3200);
}

// ============================
// COMPATIBILITY ENGINE
// ============================
function calcCompatibility(c1, c2){
  let score = 60; // base
  // Complementary scoring
  for(let i=0;i<4;i++){
    if(c1[i]===c2[i]) score += 5; // Same axis = moderate
    else score += 8; // Complementary = high
  }
  // Best match bonus
  const t1 = TYPES[c1];
  if(t1 && t1.bestMatch.includes(c2)) score += 12;
  // Communication bonus (at least one O)
  if(c1[0]==='O' || c2[0]==='O') score += 5;
  return Math.min(98, Math.max(45, score));
}

function getCompatAdvice(c1, c2){
  const diffs = [];
  const sames = [];
  const labels = [['愛情表現','オープン','ひかえめ'],['親密スタイル','情熱的','安定的'],['距離感','自立型','密着型'],['将来観','柔軟型','計画型']];
  const map = {'O':0,'R':1,'P':0,'S':1,'F':0,'T':1,'D':0,'L':1};
  
  for(let i=0;i<4;i++){
    const v1 = labels[i][map[c1[i]]+1];
    const v2 = labels[i][map[c2[i]]+1];
    if(c1[i]===c2[i]) sames.push(labels[i][0]+'は共通（'+v1+'）');
    else diffs.push(labels[i][0]+'が異なる（'+v1+' ↔ '+v2+'）');
  }
  
  let advice = '';
  if(sames.length>0) advice += '共通点: '+sames.join('、')+'。';
  if(diffs.length>0) advice += ' 違いがある部分: '+diffs.join('、')+'。';
  
  if(diffs.length<=1) advice += ' お互いの価値観が近く、自然体で過ごせる関係です。共通点が多い分、マンネリには注意して新しい体験を一緒に。';
  else if(diffs.length===2) advice += ' バランスの取れた組み合わせ。違いがある部分はお互いの「違い」を理解し合うことで、関係がより豊かになります。';
  else advice += ' 多くの面で補い合える組み合わせ。最初は戸惑うかもしれませんが、お互いの「違い」を受け入れることで大きく成長できます。定期的に気持ちを共有する時間を作りましょう。';
  
  return advice;
}

// ============================
function shareToPartner(){
  const code = getTypeCode();
  const url = window.location.origin + window.location.pathname + '?p=' + code;
  navigator.clipboard.writeText(url).then(()=>{
    document.getElementById('partnerCopied').style.display='block';
    setTimeout(()=>{document.getElementById('partnerCopied').style.display='none'},3000);
  }).catch(()=>{
    prompt('このリンクをパートナーに送ってください:', url);
  });
}

function copyResult(){
  const code = getTypeCode();
  const type = TYPES[code];
  const text = `【aibo 愛・I 診断結果】\nタイプ: ${type.emoji} ${type.name} (${code})\n${type.copy}\n\n診断はこちら→ ${window.location.origin+window.location.pathname}`;
  navigator.clipboard.writeText(text).catch(()=>prompt('コピー:',text));
}
